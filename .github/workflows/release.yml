name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Marky ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        run: |
          tar -czf "Marky_${{ steps.version.outputs.version }}_aarch64.tar.gz" \
            -C src-tauri/target/release/bundle/macos \
            Marky.app

      - name: Upload tarball to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "Marky_${{ steps.version.outputs.version }}_aarch64.tar.gz" \
            --clobber

      - name: Compute SHA256
        id: sha
        run: |
          sha=$(shasum -a 256 "Marky_${{ steps.version.outputs.version }}_aarch64.tar.gz" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/GRVYDEV/homebrew-tap.git tap
          cd tap

          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/marky.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/marky.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/marky.rb
          git commit -m "Update marky to v${VERSION}"
          git push
